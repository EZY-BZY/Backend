name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          fingerprint: true
          script: |
            set -e

            cd /opt/projects/beasy/backend

            echo "Pull latest code..."
            git pull origin main

            echo "Clear pip cache inside old backend container if exists..."
            docker compose exec -T app pip cache purge || true

            echo "Rebuild backend without Docker cache..."
            docker compose build --no-cache app

            echo "Start backend..."
            docker compose up -d app

            echo "Run Alembic migrations..."
            docker compose exec -T app alembic upgrade head

            echo "Clean unused Docker images..."
            docker image prune -f

            echo "Show backend status..."
            docker compose ps

            echo "Show last logs..."
            docker compose logs --tail=100 app